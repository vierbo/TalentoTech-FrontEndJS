<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Grave | Tienda para bajistas</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&family=Russo+One&display=swap" rel="stylesheet">
    <!-- SEO -->
     <meta name="description" content="Revisa tu carrito de compras en Grave. Finaliza tu pedido de bajos eléctricos y accesorios con total seguridad.">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="header-logo">
                <img src="../img/logo_tienda.png" alt="Logo de Grave Tienda">
            </a>
            <h1 class="header-title">Grave</h1>
            <nav class="nav">
                <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
                <label for="nav-toggle" class="nav-toggle-label" aria-label="Abrir menú">☰</label>
                <ul class="nav-menu">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#productos">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="./carrito.html" class="carrito-icono">
                        <img src="../img/icon-carrito.png" alt="Carrito">
                        <span id="contador-carrito">0</span></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
      <h2>Carrito de compras</h2>
      <section id="contenedor-carrito" class="product-grid">
        <!-- Productos del carrito -->
      </section>

      <div id="acciones-carrito" class="acciones-carrito">
        <!-- Botones de eliminar y finalizar compra se agregan desde JS -->
      </div>

      <section id="resumen-carrito">
        <!-- Aca ira el resumen del carrito -->
      </section>
    </main>

    <footer class="footer">
        <p>Grave | Tienda para bajistas &copy; 2026</p>
        <div class="social-icons">
            <a href="mailto:contacto@grave.com"><img src="../img/icon-mail.png" alt="Icono de mail"></a>
            <a href="https://instagram.com" target="_blank"><img src="../img/icon-ig.png" alt="Icono de Instagram"></a>
            <a href="https://youtube.com" target="_blank"><img src="../img/icon-youtube.png" alt="Icono de YouTube"></a>
        </div>
    </footer>
    <script type="module" src="../js/carrito.js"></script>
</body>
</html>
