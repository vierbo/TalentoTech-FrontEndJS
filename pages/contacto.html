<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Grave | Tienda para bajistas</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="header-logo">
                <img src="../img/logo_tienda.png" alt="Logo de Grave Tienda">
            </a>
            <h1 class="header-title">Grave</h1>
            <nav class="nav">
                <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
                <label for="nav-toggle" class="nav-toggle-label" aria-label="Abrir menú">☰</label>
                <ul class="nav-menu">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../index.html#productos">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contact-main">
        <section class="contact-section">
            <h2>Contacto</h2>
            <p>¿Tenés alguna duda? ¡Escribinos!</p>
            <form action="https://formspree.io/f/xlgzodzw" method="POST" class="contact-form">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>Grave | Tienda para bajistas &copy; 2026</p>
        <div class="social-icons">
            <a href="mailto:contacto@grave.com"><img src="../img/icon-mail.png" alt="Icono de mail"></a>
            <a href="https://instagram.com" target="_blank"><img src="../img/icon-ig.png" alt="Icono de Instagram"></a>
            <a href="https://youtube.com" target="_blank"><img src="../img/icon-youtube.png" alt="Icono de YouTube"></a>
        </div>
    </footer>
</body>
</html>
